  .option.incorrect { background: var(--incorrect-bg); border-color: var(--incorrect); }
  .option.disabled { cursor: default; }
  .option .letter { font-weight: 700; color: var(--accent); min-width: 20px; }
  .option.correct .letter { color: var(--correct); }
  .option.incorrect .letter { color: var(--incorrect); }

  .feedback.correct { background: var(--correct-bg); color: var(--correct); }
  .feedback.incorrect { background: var(--incorrect-bg); color: var(--incorrect); }

  .result-sub { text-align: center; color: var(--muted); margin-bottom: 20px; }
  .review-item { border-top: 1px solid var(--border); padding: 14px 0; }

const letters = ["A", "B", "C", "D"];
const app = document.getElementById("app");
const pageHead = document.getElementById("pageHead");
const navItems = document.getElementById("navItems");

let activeQuiz = QUIZZES[0];
let quizCount = activeQuiz.questions.length;
let run = [], current = 0, score = 0, answered = false, history = [];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildRun() {
  let order = shuffle(activeQuiz.questions.map((_, i) => i)).slice(0, quizCount);
  return order.map(idx => {
    const orig = activeQuiz.questions[idx];
    const optIdx = shuffle(orig.options.map((_, i) => i));
    const options = optIdx.map(i => orig.options[i]);
    const correct = optIdx.indexOf(orig.correct);
    return { q: orig.q, options, correct, bron: orig.bron || "" };
  });
}

function renderNav() {
  navItems.innerHTML = "";
  QUIZZES.forEach(qz => {
    const b = document.createElement("button");
    b.className = "nav-item" + (qz.id === activeQuiz.id ? " active" : "");
    b.innerHTML = `${qz.nav}<span class="cnt">${qz.questions.length}</span>`;
    b.onclick = () => selectQuiz(qz.id);
    navItems.appendChild(b);
  });
}

function selectQuiz(id) {
  activeQuiz = QUIZZES.find(q => q.id === id) || QUIZZES[0];
  quizCount = activeQuiz.questions.length;
  renderNav();
  renderStart();
}

function renderHead() {
  pageHead.innerHTML = `<h1>${activeQuiz.title}</h1><p>${activeQuiz.subtitle}</p>`;
}

function renderStart() {
  renderHead();
  const total = activeQuiz.questions.length;
  const presets = [20, 40].filter(n => n < total);
  const presetBtns = presets.map(n => `<button class="btn secondary" data-n="${n}">${n}</button>`).join("");
  app.innerHTML = `
    <div class="start-screen">
      <p>${activeQuiz.intro}<br>Na elk antwoord zie je direct of het klopt.</p>
      <div class="opt-row" id="countRow">
        <span style="color:var(--muted);font-size:0.85rem;">Aantal vragen:</span>
        ${presetBtns}
        <button class="btn secondary active" data-n="${total}">Alle (${total})</button>
      </div>
      <div class="actions" style="justify-content:center;">
        <button class="btn" id="startBtn">Start oefenquiz</button>
      </div>
    </div>`;
  const row = document.getElementById("countRow");
  row.querySelectorAll("button").forEach(b => {
    b.onclick = () => {
      row.querySelectorAll("button").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      quizCount = parseInt(b.dataset.n, 10);
    };
  });
  document.getElementById("startBtn").onclick = () => {
    run = buildRun(); current = 0; score = 0; answered = false; history = [];
    renderQuestion();
  };
}

function renderQuestion() {
  answered = false;
  const item = run[current];
  const pct = Math.round((current / run.length) * 100);
  app.innerHTML = `
    <div class="progress-row">
      <span>Vraag ${current + 1} van ${run.length}</span>
      <span>Score: ${score}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-text">${item.q}</div>
    <div id="options"></div>
    <div id="feedback"></div>
    <div class="actions">
      <button class="btn" id="nextBtn" disabled>${current + 1 < run.length ? "Volgende" : "Bekijk resultaat"}</button>
    </div>`;
  const optionsEl = document.getElementById("options");
  item.options.forEach((opt, i) => {
    const div = document.createElement("div");
    div.className = "option";
    div.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    div.onclick = () => selectAnswer(i);
    optionsEl.appendChild(div);
  });
  document.getElementById("nextBtn").onclick = () => {
    current++;
    if (current < run.length) renderQuestion(); else renderResult();
  };
}

function selectAnswer(i) {
  if (answered) return;
  answered = true;
  const item = run[current];
  const isCorrect = i === item.correct;
  if (isCorrect) score++;
  history.push({ q: item.q, options: item.options, chosen: i, correct: item.correct, bron: item.bron });
  document.querySelectorAll(".option").forEach((el, idx) => {
    el.classList.add("disabled");
    if (idx === item.correct) el.classList.add("correct");
    if (idx === i && !isCorrect) el.classList.add("incorrect");
  });
  document.getElementById("feedback").innerHTML = `<div class="feedback ${isCorrect ? "correct" : "incorrect"}">
    ${isCorrect ? "Correct!" : "Incorrect. Juiste antwoord: " + letters[item.correct] + " - " + item.options[item.correct]}
    ${item.bron ? `<span class="bron">Bron: ${item.bron}</span>` : ""}
  </div>`;
  document.getElementById("nextBtn").disabled = false;
}

function renderResult() {
  const pct = Math.round((score / run.length) * 100);
  const reviewHtml = history.map((h, i) => `
    <div class="review-item">
      <div class="q">${i + 1}. ${h.q}</div>
      <div class="a ${h.chosen === h.correct ? "correct" : "incorrect"}">Jouw antwoord: ${letters[h.chosen]} - ${h.options[h.chosen]}</div>
      ${h.chosen !== h.correct ? `<div class="a correct">Juist antwoord: ${letters[h.correct]} - ${h.options[h.correct]}</div>` : ""}
      ${h.bron ? `<div class="bron">Bron: ${h.bron}</div>` : ""}
    </div>`).join("");
  app.innerHTML = `
    <div class="result-score">${score} / ${run.length}</div>
    <div class="result-sub">${pct}% correct</div>
    <div class="actions" style="justify-content:center; gap:10px;">
      <button class="btn" id="retryBtn">Opnieuw oefenen</button>
      <button class="btn secondary" id="homeBtn">Naar startscherm</button>
    </div>
    <div style="margin-top:24px;">${reviewHtml}</div>`;
  document.getElementById("retryBtn").onclick = () => {
    run = buildRun(); current = 0; score = 0; answered = false; history = [];
    renderQuestion();
  };
  document.getElementById("homeBtn").onclick = renderStart;
}

renderNav();
renderStart();
</script>
